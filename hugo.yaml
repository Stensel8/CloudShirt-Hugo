baseURL: https://stensel8.github.io/CloudShirt-Hugo/
title: CloudShirt

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: GitHub
      weight: 2
      url: "https://github.com/Stensel8/CloudShirt-Hugo"
      params:
        icon: github
    - name: Search
      weight: 3
      params:
        type: search

params:
  description: "CloudShirt – Hugo edition. Lightweight documentation site for the CloudShirt school assignment."

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  search:
    flexsearch:
      js: js/flexsearch.bundle.min.js

  editURL:
    enable: false
