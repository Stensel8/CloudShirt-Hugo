networks:
  cloudshirt_net:
    driver: overlay

services:
  web:
    image: "${ECR_WEB_IMAGE:-cloudshirt-go-web:latest}"
    networks:
      - cloudshirt_net
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    image: "${ECR_API_IMAGE:-cloudshirt-go-api:latest}"
    networks:
      - cloudshirt_net
    environment:
      API_ADDR: ":8081"
      DATABASE_URL: "postgres://cloudshirt:cloudshirt@db:5432/cloudshirt?sslmode=disable"
      CATALOG_JSON_PATH: "/app/data/cloudshirt/catalog.json"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:18-alpine
    networks:
      - cloudshirt_net
    environment:
      POSTGRES_USER: cloudshirt
      POSTGRES_PASSWORD: cloudshirt
      POSTGRES_DB: cloudshirt
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudshirt -d cloudshirt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
