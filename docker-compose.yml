services:
  web:
    container_name: cloudshirt-go-web
    image: cloudshirt-go-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5106:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    container_name: cloudshirt-go-api
    image: cloudshirt-go-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      API_ADDR: ":8081"
      DATABASE_URL: "postgres://cloudshirt:cloudshirt@db:5432/cloudshirt?sslmode=disable"
      CATALOG_JSON_PATH: "/app/data/cloudshirt/catalog.json"
    ports:
      - "5200:8081"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  db:
    container_name: cloudshirt-go-db
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: cloudshirt
      POSTGRES_PASSWORD: cloudshirt
      POSTGRES_DB: cloudshirt
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudshirt -d cloudshirt"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  postgres-data:
