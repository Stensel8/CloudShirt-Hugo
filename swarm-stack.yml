version: "3.8"

services:

  eshopwebmvc:
    image: ${DOCKER_REGISTRY}/eshopwebmvc:latest
    depends_on:
      - postgres
    environment:
      DatabaseProvider: postgres
      UseOnlyInMemoryDatabase: "false"
      ConnectionStrings__CatalogConnection: Host=postgres;Port=5432;Database=eshop_catalog;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      ConnectionStrings__IdentityConnection: Host=postgres;Port=5432;Database=eshop_identity;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
    ports:
      - target: 80
        published: 5601
        protocol: tcp
        mode: host

  eshoppublicapi:
    image: ${DOCKER_REGISTRY}/eshoppublicapi:latest
    depends_on:
      - postgres
    environment:
      DatabaseProvider: postgres
      UseOnlyInMemoryDatabase: "false"
      ConnectionStrings__CatalogConnection: Host=postgres;Port=5432;Database=eshop_catalog;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      ConnectionStrings__IdentityConnection: Host=postgres;Port=5432;Database=eshop_identity;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    deploy:
      placement:
        constraints:
          - node.role == worker
