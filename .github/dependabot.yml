version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      microsoft-core:
        patterns:
          - "Microsoft.AspNetCore*"
          - "Microsoft.EntityFrameworkCore*"
          - "Microsoft.Extensions*"
        update-types:
          - "minor"
          - "patch"
      system-packages:
        patterns:
          - "System.*"
      testing:
        patterns:
          - "xunit*"
          - "MSTest*"
          - "coverlet*"
          - "moq*"
      app-framework:
        patterns:
          - "Ardalis.*"
          - "AutoMapper*"
          - "MediatR*"
          - "FluentValidation"
          - "Blazored.*"
          - "Swashbuckle.*"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    rebase-strategy: "auto"
    commit-message:
      prefix: "ci(actions):"