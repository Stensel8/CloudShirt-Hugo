name: CloudShirt Hugo CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Hugo Build
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.159.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Hugo
        run: |
          wget -qO ${{ runner.temp }}/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf ${{ runner.temp }}/hugo.tar.gz -C ${{ runner.temp }}
          sudo mv ${{ runner.temp }}/hugo /usr/local/bin/hugo
          hugo version

      - name: Hugo module cache
        uses: actions/cache@v4
        with:
          path: /root/.cache/hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build Hugo site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --gc --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  docker:
    name: Docker Build and Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: cloudshirt-hugo:ci

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: cloudshirt-hugo:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  pr-feedback:
    name: PR Feedback
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build, docker]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Post CI summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudshirt-ci-feedback -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            const buildResult = '${{ needs.build.result }}';
            const dockerResult = '${{ needs.docker.result }}';
            const ok = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';

            const intro = (buildResult === 'success' && dockerResult === 'success')
              ? `Hey @${author}, alle checks zijn groen ✅`
              : `Hey @${author}, er zijn problemen gevonden. Controleer de job logs.`;

            const body = [
              marker,
              '## CI feedback',
              '',
              intro,
              '',
              `| Job | Status |`,
              `|---|---|`,
              `| Hugo build | ${ok(buildResult)} |`,
              `| Docker build + Trivy | ${ok(dockerResult)} |`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100
            });

            const existing = comments.data.find(
              c => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }
