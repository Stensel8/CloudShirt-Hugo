name: CloudShirt Hugo CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Hugo Build
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.159.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Hugo
        run: |
          wget -qO ${{ runner.temp }}/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf ${{ runner.temp }}/hugo.tar.gz -C ${{ runner.temp }}
          sudo mv ${{ runner.temp }}/hugo /usr/local/bin/hugo
          hugo version

      - name: Hugo module cache
        uses: actions/cache@v4
        with:
          path: /root/.cache/hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Verify Hugo config
        run: hugo config

      - name: Build Hugo site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --gc --minify

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudshirt-hugo-site
          path: ./public
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  pr-feedback:
    name: PR Feedback
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build, security]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Post CI summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudshirt-ci-feedback -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            const buildResult = '${{ needs.build.result }}';
            const securityResult = '${{ needs.security.result }}';
            const ok = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';

            const intro = (buildResult === 'success' && securityResult === 'success')
              ? `Hey @${author}, alle checks zijn groen ✅`
              : `Hey @${author}, er zijn problemen gevonden. Controleer de job logs.`;

            const body = [
              marker,
              '## CI feedback',
              '',
              intro,
              '',
              `| Job | Status |`,
              `|---|---|`,
              `| Hugo build | ${ok(buildResult)} |`,
              `| Security scan (Trivy) | ${ok(securityResult)} |`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100
            });

            const existing = comments.data.find(
              c => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }
