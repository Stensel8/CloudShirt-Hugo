server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(css|js|woff2?|png|jpg|jpeg|gif|svg|ico|avif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Hugo generates clean URLs; serve index.html for directory requests
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Docker Swarm interne DNS-resolver: lost api op per request (lazy),
    # niet bij nginx-startup. Voorkomt fatale crash als api nog niet bereikbaar is.
    resolver 127.0.0.11 valid=5s;

    # Proxy API traffic to the Go backend service
    location /api/ {
        set $api_upstream http://api:8081;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
